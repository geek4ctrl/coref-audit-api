version: "3.9"

services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: change_this_secret
      DATABASE_URL: postgresql://coref:coref@db:5432/coref_audit
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coref
      POSTGRES_PASSWORD: coref
      POSTGRES_DB: coref_audit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
